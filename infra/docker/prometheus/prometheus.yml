global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "weavedeck-apiserver"
    static_configs:
      - targets: ["apiserver:2122"]

  - job_name: "weavedeck-worker"
    static_configs:
      - targets: ["worker:2122"]
